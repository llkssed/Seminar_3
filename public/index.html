<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чат с GigaChat</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --user: linear-gradient(135deg, #3b82f6, #2563eb);
      --bot: rgba(255, 255, 255, 0.08);
      --input: rgba(15, 23, 42, 0.65);
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #1d4ed8 0%, transparent 30%),
        radial-gradient(circle at top right, #0f766e 0%, transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 980px;
      height: 88vh;
      min-height: 680px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--panel-border);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e;
    }

    .chat {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chat::-webkit-scrollbar {
      width: 10px;
    }

    .chat::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
      border-radius: 999px;
    }

    .welcome {
      align-self: center;
      max-width: 760px;
      text-align: center;
      padding: 24px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 22px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .message-row {
      display: flex;
      width: 100%;
      animation: fadeUp 0.22s ease;
    }

    .message-row.user-row {
      justify-content: flex-end;
    }

    .message-row.bot-row {
      justify-content: flex-start;
    }

    .message {
      max-width: min(78%, 760px);
      padding: 14px 18px;
      border-radius: 20px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
    }

    .message.user {
      background: var(--user);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .message.bot {
      background: var(--bot);
      border: 1px solid var(--panel-border);
      color: var(--text);
      border-bottom-left-radius: 8px;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.14);
      border: 1px solid rgba(239, 68, 68, 0.28);
      color: #fecaca;
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 14px 18px;
      border-radius: 20px;
      border-bottom-left-radius: 8px;
      background: var(--bot);
      border: 1px solid var(--panel-border);
      width: fit-content;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
      animation: blink 1.3s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    .input-wrap {
      padding: 20px 24px 24px;
      border-top: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      padding: 14px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid var(--panel-border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    textarea {
      flex: 1;
      min-height: 56px;
      max-height: 180px;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      font-family: inherit;
      padding: 10px 6px;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 16px 22px;
      min-width: 140px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 12px 26px rgba(14, 165, 233, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(14, 165, 233, 0.34);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    .hint {
      margin-top: 10px;
      padding-left: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.3;
        transform: scale(0.9);
      }
      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 0;
      }

      .app {
        height: 100vh;
        min-height: 100vh;
        border-radius: 0;
      }

      .header {
        padding: 18px;
        gap: 12px;
        flex-direction: column;
        align-items: flex-start;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      .chat {
        padding: 16px;
      }

      .message {
        max-width: 90%;
        font-size: 15px;
      }

      .input-wrap {
        padding: 14px;
      }

      .input-box {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">🤖</div>
        <div class="title-wrap">
          <h1>Чат с GigaChat</h1>
          <p>Умный помощник прямо на вашем сайте</p>
        </div>
      </div>

      <div class="status">
        <span class="status-dot"></span>
        <span>Онлайн</span>
      </div>
    </header>

    <main id="chat" class="chat">
      <div class="welcome" id="welcome">
        Напишите сообщение ниже — бот получит его через API GigaChat и вернёт ответ прямо на странице.
      </div>
    </main>

    <div class="input-wrap">
      <div class="input-box">
        <textarea
          id="message"
          rows="1"
          placeholder="Введите сообщение..."
        ></textarea>
        <button id="sendBtn">Отправить</button>
      </div>
      <div class="hint">Enter — отправить, Shift + Enter — новая строка</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat')
    const messageInput = document.getElementById('message')
    const sendBtn = document.getElementById('sendBtn')
    const welcome = document.getElementById('welcome')

    function removeWelcome() {
      if (welcome) {
        welcome.remove()
      }
    }

    function autoResizeTextarea() {
      messageInput.style.height = 'auto'
      messageInput.style.height = Math.min(messageInput.scrollHeight, 180) + 'px'
    }

    function addMessage(text, type = 'bot', isError = false) {
      removeWelcome()

      const row = document.createElement('div')
      row.className = `message-row ${type === 'user' ? 'user-row' : 'bot-row'}`

      const div = document.createElement('div')
      div.className = `message ${type}${isError ? ' error' : ''}`
      div.textContent = text

      row.appendChild(div)
      chat.appendChild(row)
      chat.scrollTop = chat.scrollHeight
    }

    function addTyping() {
      removeWelcome()

      const row = document.createElement('div')
      row.className = 'message-row bot-row'
      row.id = 'typingRow'

      const typing = document.createElement('div')
      typing.className = 'typing'
      typing.innerHTML = '<span></span><span></span><span></span>'

      row.appendChild(typing)
      chat.appendChild(row)
      chat.scrollTop = chat.scrollHeight
    }

    function removeTyping() {
      const typingRow = document.getElementById('typingRow')
      if (typingRow) typingRow.remove()
    }

    async function sendMessage() {
      const message = messageInput.value.trim()
      if (!message) return

      addMessage(message, 'user')
      messageInput.value = ''
      autoResizeTextarea()

      sendBtn.disabled = true
      sendBtn.textContent = 'Отправка...'
      addTyping()

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message }),
        })

        const data = await response.json()
        removeTyping()

        if (!response.ok) {
          throw new Error(data.error || 'Ошибка сервера')
        }

        addMessage(data.reply, 'bot')
      } catch (error) {
        removeTyping()
        addMessage(`Ошибка: ${error.message}`, 'bot', true)
      } finally {
        sendBtn.disabled = false
        sendBtn.textContent = 'Отправить'
        messageInput.focus()
      }
    }

    sendBtn.addEventListener('click', sendMessage)

    messageInput.addEventListener('input', autoResizeTextarea)

    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault()
        sendMessage()
      }
    })

    autoResizeTextarea()
  </script>
</body>
</html>
